services:
  - type: web
    name: miomedic-turnos
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    # Liveness probe — Render reinicia la instancia si /healthz devuelve != 200
    healthCheckPath: /healthz
    envVars:
      # Clave de firma JWT — Render la genera automáticamente y la persiste.
      # NO copiar en otros servicios ni subir al repo.
      - key: SECRET_KEY
        generateValue: true
      # Contraseña inicial del admin. Render la genera una vez; se loguea al
      # primer arranque y debe cambiarse en el primer login.
      - key: INITIAL_ADMIN_PASSWORD
        generateValue: true
      # Clave independiente para cifrado at-rest de PII (telefono, email,
      # totp_secret). Se genera una vez y se persiste en Render; rotarla
      # requiere re-cifrar los datos con la clave vieja antes.
      - key: FIELD_ENCRYPTION_KEY
        generateValue: true
      # Duración del refresh token (días). 30 es un buen default para una app
      # interna con rotación+detección de reuso.
      - key: REFRESH_TOKEN_DAYS
        value: "30"
      # Lista blanca de orígenes CORS. Por default el frontend se sirve desde
      # el mismo dominio que el backend, así que alcanza con dejar vacío.
      # Si hubiera un frontend en otro dominio, listarlo separado por comas.
      - key: CORS_ORIGINS
        value: ""
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_TEMPLATE_NAME
        value: recordatorio_turno
      - key: WHATSAPP_TEMPLATE_LANG
        value: es_AR
      - key: WHATSAPP_API_VERSION
        value: v21.0
      # Retención del backup automático del SQLite (en días). El job corre
      # cada día a las 03:00 y guarda en /backend/backups/.
      - key: BACKUP_RETENTION_DAYS
        value: "14"
    disk:
      name: miomedic-data
      mountPath: /backend
      sizeGB: 1

  # ──────────────────────────────────────────────────────────────
  # Servicio separado para la demo pública. Corre exactamente el
  # mismo código pero con DEMO_MODE=1 — el backend siembra datos
  # ficticios extra al primer arranque (médicos, horarios, pacientes,
  # turnos) y fija las credenciales a DEMO_PASSWORD para que el
  # visitante entre con un click desde el banner de /login.
  # WhatsApp y el backup diario quedan deshabilitados en demo.
  # ──────────────────────────────────────────────────────────────
  - type: web
    name: miomedic-demo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DEMO_MODE
        value: "1"
      - key: DEMO_PASSWORD
        value: demo123
      # Clave de firma JWT — distinta de prod para que los tokens no se crucen.
      - key: SECRET_KEY
        generateValue: true
      # En demo, admin nace con DEMO_PASSWORD; esta var igual existe por compat,
      # pero el código la ignora cuando DEMO_MODE está activo.
      - key: INITIAL_ADMIN_PASSWORD
        value: demo123
      # Clave independiente para cifrado at-rest (cada servicio debe tener la suya).
      - key: FIELD_ENCRYPTION_KEY
        generateValue: true
      - key: REFRESH_TOKEN_DAYS
        value: "30"
      - key: CORS_ORIGINS
        value: ""
      # No hay credenciales de WhatsApp: el scheduler no arranca en DEMO_MODE.
    disk:
      name: miomedic-demo-data
      mountPath: /backend
      sizeGB: 1
