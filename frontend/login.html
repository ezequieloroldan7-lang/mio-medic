<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#FAF7F3"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="MIO Medic"/>
  <link rel="manifest" href="/manifest.webmanifest"/>
  <link rel="icon" href="/static/img/logo.png" type="image/png"/>
  <link rel="apple-touch-icon" href="/static/img/logo.png"/>
  <title>MIO MEDIC — Iniciar sesion</title>
  <script src="/static/js/theme.js?v=2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;500;600;700&display=swap">
  <style>
    :root {
      --lg-bg: #FAF7F3;
      --lg-surface: #FFFFFF;
      --lg-text: #2B241E;
      --lg-label: #6B5B4F;
      --lg-muted: #6B5F53;
      --lg-border: #E8E0D8;
      --lg-primary: #6B5B4F;
      --lg-primary-hover: #5A4A3E;
      --lg-shadow: 0 4px 20px rgba(80,55,40,.06);
      --lg-error: #c0392b;
      color-scheme: light;
    }
    /* Dark mode: solo si el usuario lo eligió (data-theme="dark").
       No seguimos prefers-color-scheme; light es el default. */
    [data-theme="dark"] {
      --lg-bg: #1A1614;
      --lg-surface: #26211C;
      --lg-text: #F0EAE0;
      --lg-label: #C8BAA8;
      --lg-muted: #9E9080;
      --lg-border: #3A332C;
      --lg-primary: #7A6857;
      --lg-primary-hover: #8A7866;
      --lg-shadow: 0 4px 20px rgba(0,0,0,.4);
      --lg-error: #D88585;
      color-scheme: dark;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Raleway', sans-serif;
      background: var(--lg-bg);
      color: var(--lg-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--lg-surface);
      border-radius: 16px;
      box-shadow: var(--lg-shadow);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-logo {
      width: 120px; height: 120px;
      margin: 0 auto .25rem;
      object-fit: contain;
      display: block;
    }
    .login-subtitle {
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .25rem;
      color: var(--lg-muted);
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .08rem;
      text-transform: uppercase;
      color: var(--lg-label);
      margin-bottom: .4rem;
    }
    .form-group input {
      width: 100%;
      padding: .75rem 1rem;
      background: var(--lg-surface);
      color: var(--lg-text);
      border: 1px solid var(--lg-border);
      border-radius: 8px;
      font-family: inherit;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus {
      border-color: var(--lg-primary);
    }
    .btn-login {
      width: 100%;
      padding: .85rem;
      background: var(--lg-primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: .5rem;
      transition: background .2s;
    }
    .btn-login:hover { background: var(--lg-primary-hover); }
    .error-msg {
      color: var(--lg-error);
      font-size: .8rem;
      margin-top: 1rem;
      display: none;
    }
    /* Banner de modo demo: solo se muestra cuando /demo-info devuelve demo:true */
    .demo-banner {
      background: #FFF5D6;
      border: 1px solid #E4C66B;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      text-align: left;
      color: #6B5000;
    }
    [data-theme="dark"] .demo-banner {
      background: #3A2F10;
      border-color: #8F6F30;
      color: #F2D98A;
    }
    .demo-banner-title {
      font-weight: 700;
      font-size: .8rem;
      letter-spacing: .1rem;
      text-transform: uppercase;
      margin-bottom: .35rem;
    }
    .demo-banner-sub {
      font-size: .75rem;
      opacity: .9;
      margin-bottom: .75rem;
    }
    .demo-creds { list-style: none; padding: 0; margin: 0; }
    .demo-creds li {
      display: flex; align-items: center; justify-content: space-between;
      gap: .5rem; padding: .35rem 0;
      border-top: 1px dashed rgba(0,0,0,.1);
      font-size: .78rem;
    }
    [data-theme="dark"] .demo-creds li { border-top-color: rgba(255,255,255,.1); }
    .demo-creds li:first-child { border-top: none; }
    .demo-creds-rol { font-weight: 600; }
    .demo-creds-usuario { font-family: ui-monospace, Menlo, monospace; opacity: .9; }
    .demo-cred-btn {
      border: 1px solid currentColor;
      background: transparent;
      color: inherit;
      border-radius: 6px;
      padding: .25rem .55rem;
      font-size: .7rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .demo-cred-btn:hover { background: rgba(0,0,0,.06); }
    [data-theme="dark"] .demo-cred-btn:hover { background: rgba(255,255,255,.08); }
  </style>
</head>
<body>
  <div class="login-card">
    <img class="login-logo" src="/static/img/logo.png" alt="MIO MEDIC" width="120" height="120"/>
    <div class="login-subtitle">Medicina Integral Oncologica & Estetica</div>
    <div id="demo-banner" class="demo-banner" hidden></div>
    <form id="login-form">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" id="username" autocomplete="username" placeholder="Ej: mioturnos" autofocus/>
      </div>
      <div class="form-group">
        <label>Contrasena</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="Tu contraseña"/>
      </div>
      <div class="form-group" id="totp-group" style="display:none;">
        <label>Codigo de verificacion (2FA)</label>
        <input type="text" id="totp_code" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" placeholder="6 digitos"/>
      </div>
      <button type="submit" class="btn-login">Iniciar sesion</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
  </div>
  <script src="/static/js/login.js?v=2"></script>
</body>
</html>
