<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#FAF7F3"/>
  <title>MIO MEDIC — Iniciar sesion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;500;600;700&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Raleway', sans-serif;
      background: #FAF7F3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-logo {
      font-size: 2.5rem;
      font-weight: 200;
      letter-spacing: .5rem;
      color: #6B5B4F;
      margin-bottom: .25rem;
    }
    .login-subtitle {
      font-size: .7rem;
      font-weight: 300;
      letter-spacing: .25rem;
      color: #A89888;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .08rem;
      text-transform: uppercase;
      color: #6B5B4F;
      margin-bottom: .4rem;
    }
    .form-group input {
      width: 100%;
      padding: .75rem 1rem;
      border: 1.5px solid #E8E0D8;
      border-radius: 8px;
      font-family: inherit;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus {
      border-color: #6B5B4F;
    }
    .btn-login {
      width: 100%;
      padding: .85rem;
      background: #6B5B4F;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: .5rem;
      transition: background .2s;
    }
    .btn-login:hover { background: #5A4A3E; }
    .error-msg {
      color: #c0392b;
      font-size: .8rem;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">MIO</div>
    <div class="login-subtitle">Medicina Integral Oncologica & Estetica</div>
    <form id="login-form">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" id="username" autocomplete="username" placeholder="Ej: mioturnos" autofocus/>
      </div>
      <div class="form-group">
        <label>Contrasena</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="Tu contraseña"/>
      </div>
      <button type="submit" class="btn-login">Iniciar sesion</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
  </div>
  <script>
    // Si ya hay token, redirigir al inicio
    if (localStorage.getItem("token")) {
      window.location.href = "/";
    }

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("error-msg");
      errEl.style.display = "none";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      if (!username || !password) {
        errEl.textContent = "Completa usuario y contrasena.";
        errEl.style.display = "block";
        return;
      }

      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.detail || "Error al iniciar sesion");
        }
        const data = await res.json();
        localStorage.setItem("token", data.access_token);
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = "/";
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = "block";
      }
    });
  </script>
</body>
</html>
